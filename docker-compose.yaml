# =============================================================================
# identity-core — infraestructura de desarrollo local
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Oracle Database XE 21c
  # ---------------------------------------------------------------------------
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: identity-core-oracle
    environment:
      ORACLE_PASSWORD: identity_pass
      APP_USER: identity
      APP_USER_PASSWORD: identity_pass
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  oracle_data: